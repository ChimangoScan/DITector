version: '3.8'

services:
  mongodb:
    image: mongo:latest
    container_name: ditector_mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  neo4j:
    image: neo4j:latest
    container_name: ditector_neo4j
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      - NEO4J_AUTH=none
    volumes:
      - neo4j_data:/data

  crawler:
    image: golang:1.22
    container_name: ditector_crawler
    depends_on:
      - mongodb
      - neo4j
    volumes:
      - .:/app
    working_dir: /app
    network_mode: host
    environment:
      - SEED=${SEED:-a}
    command: >
      sh -c "go run main.go crawl --workers 50 --seed $$SEED --accounts accounts.json"

volumes:
  mongo_data:
  neo4j_data:
