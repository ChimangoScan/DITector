# compose-template.yml — gerado por host LAMPAD.
# Substituir __HOST__ e __WORKERS__ no deploy.
services:
  scanners-worker:
    image: scanners-worker:0.1
    container_name: scanners-worker-__HOST__
    restart: unless-stopped
    network_mode: host
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      # CRÍTICO: bind path-idêntico host↔container. O worker spawna scanners via
      # docker.sock (DooD); quando passa "-v ${SCANNER_HOME}/lampad-worker/cache/tars/foo.tar:/work/image.tar",
      # o docker daemon resolve esse path no HOST. Se o worker tivesse cache em
      # /app/cache, o scanner spawned não acharia o tarball.
      - ${SCANNER_HOME}/lampad-worker/accounts.json:${SCANNER_HOME}/lampad-worker/accounts.json:ro
      - ${SCANNER_HOME}/lampad-worker/config.yaml:${SCANNER_HOME}/lampad-worker/config.yaml:ro
      - ${SCANNER_HOME}/lampad-worker/scanners.yaml:${SCANNER_HOME}/lampad-worker/scanners.yaml:ro
      - ${SCANNER_HOME}/lampad-worker/cache:${SCANNER_HOME}/lampad-worker/cache:rw
      - ${SCANNER_HOME}/lampad-worker/out:${SCANNER_HOME}/lampad-worker/out:rw
      - ${SCANNER_HOME}/lampad-worker/work:${SCANNER_HOME}/lampad-worker/work:rw
    command:
      - run
      - --config
      - /app/config.yaml
      - --static-only
      - --watch
      - --dockerhub-accounts
      - /app/accounts.json
      - -v
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "5"
