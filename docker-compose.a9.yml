# docker-compose.a9.yml — crawler shard 1 for second crawl node
#
# SETUP ON node2:
#   1. git clone + git pull
#   2. scp node1:~/DITector_research/accounts_node2.json .
#      scp node1:~/DITector_research/config.yaml .
#   3. GPU1_IP=<DB_HOST> sudo -E docker-compose -f docker-compose.a9.yml up -d

version: '3.8'

services:
  crawler_node2:
    image: golang:1.22
    container_name: ditector_crawler_node2
    restart: unless-stopped
    volumes:
      - .:/app
    working_dir: /app
    network_mode: host
    environment:
      - MONGO_URI=mongodb://${GPU1_IP:?GPU1_IP must be set}:27017
      - NEO4J_URI=neo4j://${GPU1_IP}:7687
      - PAGE_CONCURRENCY=${PAGE_CONCURRENCY:-8}
    command: sh -c "go build -buildvcs=false -o /tmp/ditector . && /tmp/ditector crawl --workers ${WORKERS:-50} --shard 1 --shards 2 --accounts accounts_node2.json --config config.yaml"
